version: "3.8"

services:
  app:
    build: .
    container_name: meta-ads-mcp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/meta_ads_mcp
      - REDIS_URL=redis://redis:6379/0
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - MCP_API_KEY=${MCP_API_KEY}
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN}
      - META_AD_ACCOUNT_ID=${META_AD_ACCOUNT_ID}
      - META_API_VERSION=${META_API_VERSION:-v22.0}
      - META_APP_ID=${META_APP_ID}
      - META_APP_SECRET=${META_APP_SECRET}
      - OAUTH_REDIRECT_URL=${OAUTH_REDIRECT_URL:-https://meta-ads.hellenicai.com/auth/meta/callback}
      - FREE_WEEKLY_EXECUTIONS=${FREE_WEEKLY_EXECUTIONS:-30}
      - FREE_MAX_AD_ACCOUNTS=${FREE_MAX_AD_ACCOUNTS:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - meta-ads-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: meta-ads-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=meta_ads_mcp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - meta-ads-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: meta-ads-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - meta-ads-net

  nginx:
    image: nginx:alpine
    container_name: meta-ads-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot-data:/etc/letsencrypt:ro
      - ./certbot-www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - meta-ads-net
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    container_name: meta-ads-certbot
    restart: unless-stopped
    volumes:
      - ./certbot-data:/etc/letsencrypt
      - ./certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - meta-ads-net

volumes:
  postgres_data:
  redis_data:

networks:
  meta-ads-net:
    driver: bridge
